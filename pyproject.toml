[project]
name = "trader-zex"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fyers-apiv3>=3.0.0",
    "hmmlearn>=0.3.0",
    "nsepython>=2.97",
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "python-dotenv>=1.2.2",
    "requests>=2.31.0",
    "scikit-learn>=1.3.0",
    "scipy>=1.11.0",
    "streamlit>=1.57.0",
]

[dependency-groups]
dev = [
    "poethepoet>=0.45.0",
]

[tool.poe.tasks]
screen    = "python main.py"
universe  = "python main.py --universe"
dashboard = "streamlit run dashboard.py"
auth      = "python auth.py"
